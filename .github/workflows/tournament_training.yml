name: Tournament Training on Lambda Labs

on:
  workflow_dispatch:
    inputs:
      instance_type:
        description: "Lambda Labs instance type"
        required: true
        default: "gpu_1x_a10"
        type: choice
        options:
          - gpu_1x_a10
          - gpu_1x_a100_sxm4
          - gpu_1x_rtx6000
          - gpu_8x_a100_80gb_sxm4
      population_size:
        description: "Number of agents in population"
        required: true
        default: "12"
        type: string
      generations:
        description: "Number of tournament generations"
        required: true
        default: "50"
        type: string
      episodes_per_gen:
        description: "Training episodes per generation"
        required: true
        default: "1000"
        type: string
      warmstart:
        description: "Warm-start from existing checkpoint"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      region:
        description: "Lambda Labs region"
        required: true
        default: "us-east-1"
        type: choice
        options:
          - us-east-1
          - us-west-1
          - us-west-2
          - us-west-3
          - us-south-1
          - us-midwest-1
          - europe-central-1
          - asia-south-1
          - me-west-1
          - asia-northeast-1
          - asia-northeast-2
      training_timeout_hours:
        description: "Max training time (hours) before instance is terminated"
        required: false
        default: "5"
        type: string
      dry_run:
        description: "Dry run: launch instance, verify SSH, terminate immediately (no training)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      hf_repo_id:
        description: "HuggingFace dataset repo for results (e.g. user/golf-results)"
        required: false
        default: ""
        type: string
      wandb_project:
        description: "Weights & Biases project name for training metrics"
        required: false
        default: ""
        type: string


jobs:
  # ---------------------------------------------------------------------------
  # Launch (~10 min)
  # Provisions instance, uploads code, fires off nohup training, exits.
  # Instance self-terminates when training finishes.
  # Results are uploaded to HuggingFace Hub after each generation.
  # ---------------------------------------------------------------------------
  launch:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJson(inputs.training_timeout_hours) * 60 + 30 }}
    env:
      LL_API_KEY: ${{ secrets.LL_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate API key
        run: |
          if [ -z "$LL_API_KEY" ]; then
            echo "::error::LL_API_KEY secret is not set"
            exit 1
          fi

      - name: Generate SSH key pair
        run: |
          ssh-keygen -t ed25519 -f ~/.ssh/lambda_key -N "" -q
          echo "SSH_KEY_PATH=$HOME/.ssh/lambda_key" >> $GITHUB_ENV

      - name: Check instance availability
        run: |
          RESPONSE=$(curl -s "https://cloud.lambdalabs.com/api/v1/instance-types" \
            -H "Authorization: Bearer $LL_API_KEY")
          python3 -c "
          import sys, json
          data = json.load(sys.stdin).get('data', {})
          itype = '${{ inputs.instance_type }}'
          region = '${{ inputs.region }}'
          info = data.get(itype)
          if not info:
              print(f'::error::Instance type {itype} not found in API response')
              sys.exit(1)
          regions = [r['name'] for r in info.get('regions_with_capacity_available', [])]
          print(f'Instance type: {itype}')
          print(f'Regions with capacity: {regions if regions else \"NONE\"}')
          if region not in regions:
              print(f'::error::{itype} has no capacity in {region}. Available in: {regions}')
              sys.exit(1)
          print(f'Capacity confirmed in {region}')
          " <<< "$RESPONSE"

      - name: Register SSH key with Lambda Labs
        id: register_key
        run: |
          PUB_KEY=$(cat ~/.ssh/lambda_key.pub)
          RESPONSE=$(curl -s -X POST "https://cloud.lambdalabs.com/api/v1/ssh-keys" \
            -H "Authorization: Bearer $LL_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"name\": \"golf-tournament-$(date +%s)\", \"public_key\": \"$PUB_KEY\"}")
          echo "Register response: $RESPONSE"
          KEY_NAME=$(echo "$RESPONSE" | python3 -c "
          import sys,json
          r = json.load(sys.stdin)
          if 'error' in r:
              print(f'::error::SSH key registration failed: {r[\"error\"][\"message\"]}', file=sys.stderr)
              sys.exit(1)
          print(r['data']['name'])
          ")
          echo "ssh_key_name=$KEY_NAME" >> $GITHUB_OUTPUT
          echo "Registered SSH key: $KEY_NAME"

      - name: Launch Lambda Labs instance
        id: launch_instance
        run: |
          RESPONSE=$(curl -s -X POST "https://cloud.lambdalabs.com/api/v1/instance-operations/launch" \
            -H "Authorization: Bearer $LL_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "instance_type_name": "${{ inputs.instance_type }}",
              "region_name": "${{ inputs.region }}",
              "quantity": 1,
              "name": "golf-tournament-${{ github.run_id }}",
              "ssh_key_names": ["${{ steps.register_key.outputs.ssh_key_name }}"]
            }')
          echo "Launch response: $RESPONSE"
          INSTANCE_ID=$(echo "$RESPONSE" | python3 -c "
          import sys,json
          r = json.load(sys.stdin)
          if 'error' in r:
              print(f'::error::Launch failed: {r[\"error\"][\"message\"]}', file=sys.stderr)
              sys.exit(1)
          print(r['data']['instance_ids'][0])
          ")
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "Launched instance: $INSTANCE_ID"

      - name: Wait for instance to become active
        id: wait
        run: |
          INSTANCE_ID="${{ steps.launch_instance.outputs.instance_id }}"
          for i in $(seq 1 40); do
            RESPONSE=$(curl -s "https://cloud.lambdalabs.com/api/v1/instances/$INSTANCE_ID" \
              -H "Authorization: Bearer $LL_API_KEY")
            STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin).get('data',{}); print(d.get('status','unknown'))")
            IP=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin).get('data',{}); print(d.get('ip',''))")
            echo "Attempt $i: status=$STATUS ip=$IP"
            if [ "$STATUS" = "active" ] && [ -n "$IP" ] && [ "$IP" != "None" ]; then
              echo "instance_ip=$IP" >> $GITHUB_OUTPUT
              echo "Instance ready at $IP"
              sleep 10
              exit 0
            fi
            sleep 15
          done
          echo "::error::Timeout waiting for instance to become active"
          exit 1

      # --- Dry run path: verify SSH/GPU and terminate inline ---

      - name: Dry run - verify SSH and GPU
        if: inputs.dry_run == 'true'
        run: |
          IP="${{ steps.wait.outputs.instance_ip }}"
          KEY="$SSH_KEY_PATH"
          for i in $(seq 1 20); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i $KEY ubuntu@$IP "echo ok" 2>/dev/null; then
              break
            fi
            echo "Waiting for SSH... attempt $i"
            sleep 10
          done
          echo "=== Dry run: verifying instance ==="
          ssh -T -o StrictHostKeyChecking=no -i $KEY ubuntu@$IP << 'EOF'
          echo "--- SSH: OK ---"
          echo "--- hostname: $(hostname) ---"
          echo "--- GPU info ---"
          nvidia-smi --query-gpu=name,memory.total,driver_version --format=csv,noheader 2>/dev/null || echo "(no GPU driver)"
          echo "--- Python ---"
          python3 --version
          echo "--- Disk ---"
          df -h / | tail -1
          echo "--- RAM ---"
          free -h | head -2
          echo "=== Dry run complete ==="
          EOF

      - name: Terminate instance (dry run)
        if: always() && inputs.dry_run == 'true'
        run: |
          INSTANCE_ID="${{ steps.launch_instance.outputs.instance_id }}"
          if [ -z "$INSTANCE_ID" ]; then exit 0; fi
          echo "Terminating instance $INSTANCE_ID..."
          for ATTEMPT in 1 2 3 4; do
            HTTP_CODE=$(curl -s -o /tmp/term_resp.json -w "%{http_code}" \
              -X POST "https://cloud.lambdalabs.com/api/v1/instance-operations/terminate" \
              -H "Authorization: Bearer $LL_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"instance_ids\": [\"$INSTANCE_ID\"]}")
            if [[ "$HTTP_CODE" == 2* ]]; then
              echo "Termination accepted (HTTP $HTTP_CODE)"
              break
            fi
            echo "Attempt $ATTEMPT failed (HTTP $HTTP_CODE): $(cat /tmp/term_resp.json)"
            [ "$ATTEMPT" -lt 4 ] && sleep $((2 ** ATTEMPT))
          done

      # --- Training path: setup, upload, fire off nohup training ---

      - name: Wait for SSH
        if: inputs.dry_run != 'true'
        run: |
          IP="${{ steps.wait.outputs.instance_ip }}"
          KEY="$SSH_KEY_PATH"
          for i in $(seq 1 20); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i $KEY ubuntu@$IP "echo ok" 2>/dev/null; then
              echo "SSH ready"
              exit 0
            fi
            echo "Waiting for SSH... attempt $i"
            sleep 10
          done
          echo "::error::SSH never became available"
          exit 1

      - name: Verify environment
        if: inputs.dry_run != 'true'
        run: |
          ssh -T -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10 \
            -i "$SSH_KEY_PATH" ubuntu@${{ steps.wait.outputs.instance_ip }} << 'EOF'
          set -e
          python3 -c "import torch; print(f'torch {torch.__version__}, CUDA: {torch.cuda.is_available()}')"
          EOF

      - name: Upload repository
        if: inputs.dry_run != 'true'
        run: |
          IP="${{ steps.wait.outputs.instance_ip }}"
          KEY="$SSH_KEY_PATH"
          tar czf /tmp/golf_repo.tar.gz --exclude='.git' --exclude='__pycache__' --exclude='*.pyc' --exclude='./data' --exclude='./wandb' .
          scp -o StrictHostKeyChecking=no -i $KEY /tmp/golf_repo.tar.gz ubuntu@$IP:~/
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -i $KEY ubuntu@$IP \
            "mkdir -p ~/golf && cd ~/golf && tar xzf ~/golf_repo.tar.gz && pip install -q -e ."

      - name: Upload warmstart checkpoint
        if: inputs.dry_run != 'true' && inputs.warmstart == 'true'
        run: |
          if [ -f data/self_play/self_play_best.pt ]; then
            scp -o StrictHostKeyChecking=no -i "$SSH_KEY_PATH" \
              data/self_play/self_play_best.pt ubuntu@${{ steps.wait.outputs.instance_ip }}:~/golf/warmstart.pt
            echo "WARMSTART_FLAG=--warmstart-checkpoint ~/golf/warmstart.pt" >> $GITHUB_ENV
          else
            echo "No warmstart checkpoint found, skipping"
          fi

      - name: Launch training (nohup)
        if: inputs.dry_run != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        run: |
          IP="${{ steps.wait.outputs.instance_ip }}"
          KEY="$SSH_KEY_PATH"
          INSTANCE_ID="${{ steps.launch_instance.outputs.instance_id }}"
          TIMEOUT_SECS=$(( ${{ inputs.training_timeout_hours }} * 3600 ))
          HF_REPO_FLAG=""
          if [ -n "${{ inputs.hf_repo_id }}" ]; then
            HF_REPO_FLAG="--hf-repo-id ${{ inputs.hf_repo_id }}"
          fi
          WANDB_FLAG=""
          if [ -n "${{ inputs.wandb_project }}" ]; then
            WANDB_FLAG="--wandb-project ${{ inputs.wandb_project }}"
          fi
          TRAIN_CMD="timeout ${TIMEOUT_SECS} python3 -u -m src.tournament \
            --population-size ${{ inputs.population_size }} \
            --generations ${{ inputs.generations }} \
            --episodes-per-gen ${{ inputs.episodes_per_gen }} \
            --output-dir data/tournament \
            --device auto \
            ${WARMSTART_FLAG} \
            ${HF_REPO_FLAG} \
            ${WANDB_FLAG}"

          ssh -T -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10 \
            -i $KEY ubuntu@$IP << HEREDOC
          cd ~/golf
          echo "=== Training starting at \$(date) ===" > training.log
          nvidia-smi --query-gpu=name,memory.total,memory.free --format=csv,noheader >> training.log 2>&1 || echo "(no GPU)" >> training.log
          free -h | head -2 >> training.log
          nohup bash -c '
            export HF_TOKEN=${HF_TOKEN}
            export WANDB_API_KEY=${WANDB_API_KEY}
            ${TRAIN_CMD} >> training.log 2>&1
            echo \$? > training.exit_code
            echo "=== Training done at \$(date), self-terminating ===" >> training.log
            curl -s -X POST "https://cloud.lambdalabs.com/api/v1/instance-operations/terminate" \
              -H "Authorization: Bearer ${LL_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"instance_ids\": [\"${INSTANCE_ID}\"]}" >> training.log 2>&1
          ' > /dev/null 2>&1 &
          echo "Training launched (timeout=${TIMEOUT_SECS}s), instance will self-terminate on completion"
          HEREDOC

      - name: Print summary
        if: always()
        run: |
          echo "## Launch Job" >> $GITHUB_STEP_SUMMARY
          echo "- Instance: ${{ inputs.instance_type }} in ${{ inputs.region }}" >> $GITHUB_STEP_SUMMARY
          echo "- Instance ID: ${{ steps.launch_instance.outputs.instance_id }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "- Mode: **dry run** (instance terminated)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Mode: training launched (timeout: ${{ inputs.training_timeout_hours }}h)" >> $GITHUB_STEP_SUMMARY
            echo "- Results: uploaded to HuggingFace after each generation" >> $GITHUB_STEP_SUMMARY
            if [ -n "${{ inputs.hf_repo_id }}" ]; then
              echo "- HF repo: ${{ inputs.hf_repo_id }}" >> $GITHUB_STEP_SUMMARY
            fi
            echo "- Instance will self-terminate on completion" >> $GITHUB_STEP_SUMMARY
          fi
