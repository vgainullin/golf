name: Verify Instance Cleanup

on:
  workflow_run:
    workflows: ["Tournament Training on Lambda Labs"]
    types: [completed]
  workflow_dispatch: {}

env:
  LL_API_KEY: ${{ secrets.LL_API_KEY }}

jobs:
  verify-cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check for surviving instances
        id: check
        run: |
          echo "Checking for any running golf-tournament instances..."

          RESPONSE=$(curl -s "https://cloud.lambdalabs.com/api/v1/instances" \
            -H "Authorization: Bearer $LL_API_KEY")

          INSTANCES=$(echo "$RESPONSE" | python3 -c "
          import sys, json

          data = json.load(sys.stdin).get('data', [])
          alive = []
          for inst in data:
              status = inst.get('status', '')
              if status not in ('active', 'booting'):
                  continue
              name = inst.get('name', '')
              if not name.startswith('golf-tournament'):
                  continue
              alive.append({
                  'id': inst.get('id', ''),
                  'name': name,
                  'type': inst.get('instance_type', {}).get('name', 'unknown'),
                  'status': status,
                  'ip': inst.get('ip', 'N/A'),
              })
          print(json.dumps(alive))
          " 2>/dev/null || echo "[]")

          COUNT=$(echo "$INSTANCES" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
          echo "Found $COUNT golf-tournament instance(s) still running"
          echo "instances=$INSTANCES" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Terminate surviving instances
        if: steps.check.outputs.count != '0'
        run: |
          INSTANCES='${{ steps.check.outputs.instances }}'

          echo "$INSTANCES" | python3 -c "
          import os, sys, json, subprocess, time

          api_key = os.environ['LL_API_KEY']
          instances = json.load(sys.stdin)

          for inst in instances:
              inst_id = inst['id']
              name = inst['name']
              print(f'Terminating {name} ({inst_id})...')

              for attempt in range(4):
                  result = subprocess.run([
                      'curl', '-s', '-w', '\n%{http_code}', '-X', 'POST',
                      'https://cloud.lambdalabs.com/api/v1/instance-operations/terminate',
                      '-H', f'Authorization: Bearer {api_key}',
                      '-H', 'Content-Type: application/json',
                      '-d', json.dumps({'instance_ids': [inst_id]}),
                  ], capture_output=True, text=True, timeout=30)

                  lines = result.stdout.strip().split('\n')
                  http_code = lines[-1] if lines else '0'

                  if http_code.startswith('2'):
                      print(f'  Terminated (HTTP {http_code})')
                      break
                  else:
                      print(f'  Attempt {attempt+1} failed (HTTP {http_code})')
                      if attempt < 3:
                          time.sleep(2 ** (attempt + 1))
              else:
                  print(f'  FAILED to terminate {inst_id} after 4 attempts!')

              time.sleep(2)
          "

      - name: Verify termination
        if: steps.check.outputs.count != '0'
        run: |
          echo "Waiting 15s for terminations to propagate..."
          sleep 15

          REMAINING=$(curl -s "https://cloud.lambdalabs.com/api/v1/instances" \
            -H "Authorization: Bearer $LL_API_KEY" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin).get('data', [])
          active = [i for i in data if i.get('name','').startswith('golf-tournament')
                    and i.get('status') in ('active', 'booting')]
          print(len(active))
          ")

          if [ "$REMAINING" != "0" ]; then
            echo "::error::$REMAINING instance(s) still running after cleanup!"
            echo "::error::Manually terminate at https://cloud.lambdalabs.com/instances"
            exit 1
          else
            echo "All clear - no golf-tournament instances running."
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Instance Cleanup Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.count }}" = "0" ]; then
            echo "No orphaned instances found. Termination in training workflow succeeded." >> $GITHUB_STEP_SUMMARY
          else
            echo "Found **${{ steps.check.outputs.count }}** orphaned instance(s) — terminated them." >> $GITHUB_STEP_SUMMARY
          fi
